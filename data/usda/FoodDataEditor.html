<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Data Editor</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #627083;
      --line: #d9dee7;
      --accent: #1769aa;
      --danger: #b3261e;
      --selected: #e8f2fb;
      --edited: #fff7d1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 700;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
    }
    input[type="search"] {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    main {
      padding: 14px 18px 24px;
    }
    .table-wrap {
      overflow: auto;
      height: calc(100vh - 132px);
      border: 1px solid var(--line);
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eef2f6;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-weight: 700;
    }
    th, td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    th:first-child, td:first-child {
      width: 44px;
      text-align: center;
    }
    th:nth-child(2), td:nth-child(2) { width: 44%; }
    th:not(:first-child):not(:nth-child(2)),
    td:not(:first-child):not(:nth-child(2)) { width: 14%; }
    tbody tr.selected {
      background: var(--selected);
    }
    td[contenteditable="true"] {
      background: #fff;
      outline: none;
    }
    tr.edited td[contenteditable="true"] {
      background: var(--edited);
    }
    td[contenteditable="true"]:focus {
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
      input[type="search"] {
        grid-column: 1 / -1;
      }
      .table-wrap {
        height: calc(100vh - 176px);
      }
      table {
        min-width: 760px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Food Data Editor</h1>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search foods">
      <button id="deleteSelected" class="danger" disabled>Delete selected</button>
      <button id="restoreHidden">Show all</button>
      <button id="exportCsv" class="primary">Export cleaned CSV</button>
    </div>
    <div id="status" class="status"></div>
  </header>
  <main>
    <div class="table-wrap">
      <table id="foodTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

    const table = document.getElementById('foodTable');
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    const search = document.getElementById('search');
    const status = document.getElementById('status');
    const deleteSelected = document.getElementById('deleteSelected');
    const restoreHidden = document.getElementById('restoreHidden');
    const exportCsv = document.getElementById('exportCsv');

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = '';
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (quoted) {
          if (ch === '"' && next === '"') {
            value += '"';
            i++;
          } else if (ch === '"') {
            quoted = false;
          } else {
            value += ch;
          }
        } else if (ch === '"') {
          quoted = true;
        } else if (ch === ',') {
          row.push(value);
          value = '';
        } else if (ch === '\n') {
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else if (ch !== '\r') {
          value += ch;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows;
    }

    function toCsv(rows) {
      return rows.map(row => row.map(value => {
        const text = String(value ?? '');
        return '"' + text.replace(/"/g, '""') + '"';
      }).join(',')).join('\r\n');
    }

    const parsed = parseCsv(originalCsv);
    const headers = parsed.shift();
    const rows = parsed.map((cells, index) => ({
      id: index + 1,
      cells,
      selected: false,
      deleted: false,
      edited: false
    }));

    function renderHeader() {
      const tr = document.createElement('tr');
      const selectTh = document.createElement('th');
      selectTh.textContent = '';
      tr.appendChild(selectTh);
      headers.forEach(header => {
        const th = document.createElement('th');
        th.textContent = header;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    function filteredRows() {
      const term = search.value.trim().toLowerCase();
      return rows.filter(row => {
        if (row.deleted) return false;
        if (!term) return true;
        return row.cells.some(cell => String(cell).toLowerCase().includes(term));
      });
    }

    function renderBody() {
      tbody.textContent = '';
      const visible = filteredRows();
      const fragment = document.createDocumentFragment();
      visible.forEach(row => {
        const tr = document.createElement('tr');
        tr.dataset.id = row.id;
        if (row.selected) tr.classList.add('selected');
        if (row.edited) tr.classList.add('edited');

        const selectTd = document.createElement('td');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = row.selected;
        checkbox.addEventListener('change', () => {
          row.selected = checkbox.checked;
          updateStatus();
          tr.classList.toggle('selected', row.selected);
        });
        selectTd.appendChild(checkbox);
        tr.appendChild(selectTd);

        headers.forEach((_, cellIndex) => {
          const td = document.createElement('td');
          td.contentEditable = 'true';
          td.textContent = row.cells[cellIndex] ?? '';
          td.addEventListener('input', () => {
            row.cells[cellIndex] = td.textContent;
            row.edited = true;
            tr.classList.add('edited');
            updateStatus();
          });
          tr.appendChild(td);
        });
        fragment.appendChild(tr);
      });
      tbody.appendChild(fragment);
      updateStatus();
    }

    function updateStatus() {
      const active = rows.filter(row => !row.deleted).length;
      const deleted = rows.filter(row => row.deleted).length;
      const selected = rows.filter(row => row.selected && !row.deleted).length;
      const edited = rows.filter(row => row.edited && !row.deleted).length;
      const visible = filteredRows().length;
      deleteSelected.disabled = selected === 0;
      status.textContent = sourceName + ' copied into this browser editor. Visible: ' + visible + ' | Active: ' + active + ' | Selected: ' + selected + ' | Edited: ' + edited + ' | Deleted in this copy: ' + deleted;
    }

    deleteSelected.addEventListener('click', () => {
      rows.forEach(row => {
        if (row.selected && !row.deleted) {
          row.deleted = true;
          row.selected = false;
        }
      });
      renderBody();
    });

    restoreHidden.addEventListener('click', () => {
      search.value = '';
      renderBody();
    });

    exportCsv.addEventListener('click', () => {
      const cleanRows = [headers, ...rows.filter(row => !row.deleted).map(row => row.cells)];
      const blob = new Blob([toCsv(cleanRows)], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'food-macros-per-100g-cleaned.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    search.addEventListener('input', renderBody);
    renderHeader();
    renderBody();
  </script>
