<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMRAT - Choose Account</title>
    <link rel="icon" type="image/webp" href="Pictures/Logos/Icon.webp">
    <link rel="stylesheet" href="Css.css?v=229">
</head>
<body class="page-account-select">
    <main class="login-shell account-select-shell">
        <section class="auth-card auth-card-primary account-select-card">
            <div class="auth-brand-row">
                <img src="Pictures/Logos/Icon.webp" class="logo" alt="GYMRAT Logo">
                <span>GYMRAT</span>
            </div>
            <p class="auth-card-kicker">Google account</p>
            <h1>Choose account</h1>
            <p class="auth-lede" id="accountSelectSubtitle">Select the GYMRAT account you want to open.</p>
            <div class="account-select-list" id="accountSelectList" aria-live="polite">
                <p class="auth-message account-select-loading">Loading your GYMRAT accounts...</p>
            </div>
            <p class="auth-message" id="accountSelectStatus" aria-live="polite"></p>
            <div class="account-select-actions">
                <a class="diet-skip-link" href="index.html">Use another Google account</a>
            </div>
        </section>
    </main>
    <script src="auth.js?v=230"></script>
<script src="i18n.js?v=26"></script>
</body>
</html>
